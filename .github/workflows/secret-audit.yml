name: Secret Audit (full history)

on:
  # 1st of each month at 06:00 UTC; detector coverage grows with each
  # TruffleHog release, so old history is worth re-checking
  schedule:
    - cron: "0 6 1 * *"
  # Manual run: Actions tab -> Secret Audit (full history) -> Run workflow
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-history:
    name: Scan entire git history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog full-history scan
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
