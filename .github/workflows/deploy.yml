# .github/workflows/deploy.yml
name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; don't cancel an in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- CI: runs on every push AND every pull request ----
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22        
          cache: npm

      - name: Install dependencies
        run: npm ci               # strict, lockfile-based install for CI

      - name: Lint
        run: npm run lint --if-present   # no-op if you have no lint script

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build             # Create React App outputs to "build"

  # ---- Lighthouse audit: performance / accessibility / best-practices / SEO ----
  # Runs independently of deploy, so a low score reports a failing check
  # but never blocks the site from shipping.
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true         # save the report as a workflow artifact
          temporaryPublicStorage: true  # print a shareable report link in the logs

  # ---- CD: only deploys on pushes to main (skipped on PRs) ----
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4