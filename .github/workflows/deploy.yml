name: CI & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      # Only run Lighthouse on PRs — main doesn't need re-auditing
      - name: Configure Pages
        if: github.event_name == 'pull_request'
        uses: actions/configure-pages@v5

      - name: Serve build for Lighthouse
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p ./.lhci-public/My-Portfolio
          cp -R build/. ./.lhci-public/My-Portfolio/
          python3 -m http.server 34719 --directory ./.lhci-public > /tmp/lhci-http.log 2>&1 &
          echo $! > /tmp/lhci-http.pid

      - name: Prepare Lighthouse config
        if: github.event_name == 'pull_request'
        run: jq '.ci.collect.numberOfRuns = 1' lighthouserc.json > .lighthouserc.json

      - name: Run Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop local server
        if: always() && github.event_name == 'pull_request'
        run: if [ -f /tmp/lhci-http.pid ]; then kill "$(cat /tmp/lhci-http.pid)" || true; fi

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4