# .github/workflows/deploy.yml
name: CI & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; don't cancel an in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- Lighthouse audit: performance / accessibility / best-practices / SEO ----
  # Runs on every push and PR; builds the app and audits it
  # A low Lighthouse score reports a failing check but never blocks the site from shipping
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json', 'src/**', 'public/**') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm run build

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Prepare Lighthouse static directory
        run: |
          mkdir -p ./.lhci-public/My-Portfolio
          cp -R build/. ./.lhci-public/My-Portfolio/
          python3 -m http.server 34719 --directory ./.lhci-public > /tmp/lhci-http.log 2>&1 &
          echo $! > /tmp/lhci-http.pid

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build             # Create React App outputs to "build"

      - name: Prepare Lighthouse config
        run: |
          cp lighthouserc.json .lighthouserc.json
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            jq '.ci.collect.numberOfRuns = 1' lighthouserc.json > .lighthouserc.json
          fi

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true         # save the report as a workflow artifact
          temporaryPublicStorage: true  # print a shareable report link in the logs

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/lhci-http.pid ]; then kill "$(cat /tmp/lhci-http.pid)" || true; fi

  # ---- CD: only deploys on pushes to main (skipped on PRs) ----
  deploy:
    needs: lighthouse
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4