name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the action can diff the pushed/PR commit range
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          # Fail only on findings whose credentials TruffleHog could
          # actually validate against the provider (or could not rule
          # out) — keeps false positives from blocking merges
          extra_args: --results=verified,unknown

  # Manual full-history audit: Actions tab -> Secret Scan -> Run workflow
  full-history:
    name: Full history audit
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan entire git history
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
